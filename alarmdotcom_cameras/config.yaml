name: Alarm.com Cameras
version: "0.1.13"
slug: alarmdotcom_cameras
description: "View Alarm.com camera snapshots and live streams via a headless browser."
image: "ghcr.io/jsight/alarmdotcom-cameras-{arch}"
arch:
  - aarch64
  - amd64
url: "https://github.com/jsight/alarmdotcom-cameras"
startup: application
boot: auto
init: false

# Ingress (web UI in HA sidebar)
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:cctv"
panel_title: "Alarm.com Cameras"
panel_admin: true

# Options exposed in HA UI
options:
  snapshot_interval_minutes: 10
  stream_fps: 1
  stream_timeout_minutes: 5
  jpeg_quality: 80
  trusted_device_name: "HA Alarm.com Cameras"
  log_level: "info"

schema:
  snapshot_interval_minutes: "int(1,1440)"
  stream_fps: "list(0.5|1|2)"
  stream_timeout_minutes: "int(1,60)"
  jpeg_quality: "int(10,100)"
  trusted_device_name: "str"
  log_level: "list(debug|info|warning|error)"

# Map HA config directory to auto-install companion integration
map:
  - config:rw

# We need the HA API for the companion integration to discover us
hassio_api: true
hassio_role: default

# Watchdog health check
watchdog: "http://[HOST]:[PORT:8099]/api/health"

# Chromium needs larger /dev/shm (default 64MB is too small)
tmpfs: true

# Backup settings
backup: hot
backup_exclude:
  - "*.log"
  - "browser_state/chromium_profile/Cache/*"
  - "browser_state/chromium_profile/Code Cache/*"

# Advanced: visible to advanced users only (requires Chromium, larger image)
advanced: false
stage: experimental
